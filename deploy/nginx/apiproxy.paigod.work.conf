# Public AI API — CLB(443) → CVM(81), whitelist paths only.
#
# Install:
#   sudo cp deploy/nginx/apiproxy.paigod.work.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/apiproxy.paigod.work.conf /etc/nginx/sites-enabled/
#
# Requires: /etc/nginx/conf.d/aiproxy-upstream.conf (defines upstream aiproxy_backend)
#
# IMPORTANT: The catch-all `location /` returns 403 to block admin panel,
# Swagger, and /api/* endpoints from public access.

server {
    listen 81;
    server_name apiproxy.paigod.work;

    # Security headers
    add_header X-Content-Type-Options nosniff;

    # Max request body (file analysis needs large bodies)
    client_max_body_size 100M;

    # ── Shared proxy settings ────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # SSE streaming support (critical)
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    # Timeouts — must be >= 900s for extended thinking
    proxy_connect_timeout 60s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;

    # ── Whitelist paths (all Token-authenticated) ────────────────

    # OpenAI-compatible API
    location /v1/ {
        proxy_pass http://aiproxy_backend;
    }

    # Gemini-compatible API
    location /v1beta/ {
        proxy_pass http://aiproxy_backend;
    }

    # MCP protocol endpoints
    location /mcp/ {
        proxy_pass http://aiproxy_backend;
    }

    # MCP SSE endpoint
    location = /sse {
        proxy_pass http://aiproxy_backend;
    }

    # MCP Streamable endpoint
    location = /mcp {
        proxy_pass http://aiproxy_backend;
    }

    # MCP Message endpoint
    location = /message {
        proxy_pass http://aiproxy_backend;
    }

    # ── Catch-all: block everything else ─────────────────────────
    # Ensures admin panel, Swagger, /api/* are unreachable from public.
    location / {
        return 403 '{"error": "forbidden"}';
        add_header Content-Type application/json;
    }
}
