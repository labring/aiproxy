# AI Proxy upstream — this file is the ONLY thing modified during zero-downtime deploys.
#
# The deploy script alternates between port 3000 and 3001:
#   deploy #1: old=3000, canary=3001 → this file is rewritten to 3001
#   deploy #2: old=3001, canary=3000 → this file is rewritten to 3000
#
# Install: sudo cp deploy/nginx/overseas/aiproxy-upstream.conf /etc/nginx/conf.d/
# Active port is tracked in /data/aiproxy/.active-port

upstream aiproxy_backend {
    server 127.0.0.1:3000;
}
