# Overseas enterprise frontend — AWS ALB(443) → EC2(80), path-level isolation.
#
# Public-facing: Frontend SPA + enterprise API (Feishu SSO protected).
# Blocked: Admin API (/api/*), Swagger, Relay API (/v1/*, /mcp/*, etc.).
#
# Install:
#   sudo cp deploy/nginx/overseas/ai.pplabs.tech.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/ai.pplabs.tech.conf /etc/nginx/sites-enabled/
#
# Requires: /etc/nginx/conf.d/aiproxy-upstream.conf (defines upstream aiproxy_backend)

server {
    listen 80;
    server_name ai.pplabs.tech;

    # JSON Content-Type for error responses (return directive ignores add_header)
    default_type application/json;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Max request body (file analysis needs large bodies)
    client_max_body_size 100M;

    # Shared proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # SSE streaming support
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    # Timeouts — must be >= 900s for extended thinking (Claude Code etc.)
    proxy_connect_timeout 60s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;

    # ── Allow: Enterprise API (Feishu SSO protected) ────────────────
    location /api/enterprise/ {
        proxy_pass http://aiproxy_backend;
    }

    # ── Allow: Health check ─────────────────────────────────────────
    location = /api/status {
        proxy_pass http://aiproxy_backend;
    }

    # ── Block: Admin API (channels, tokens, groups, etc.) ───────────
    location /api/ {
        return 403 '{"error":"forbidden"}';
    }

    # ── Block: Swagger docs ─────────────────────────────────────────
    location /swagger/ {
        return 403 '{"error":"forbidden"}';
    }

    # ── Block: Relay API (should only be on apiproxy port :81) ──────
    location /v1/ {
        return 403 '{"error":"forbidden"}';
    }

    location /v1beta/ {
        return 403 '{"error":"forbidden"}';
    }

    location /mcp/ {
        return 403 '{"error":"forbidden"}';
    }

    location = /sse {
        return 403 '{"error":"forbidden"}';
    }

    location = /mcp {
        return 403 '{"error":"forbidden"}';
    }

    location = /message {
        return 403 '{"error":"forbidden"}';
    }

    # ── Allow: Frontend SPA (catch-all) ─────────────────────────────
    location / {
        proxy_pass http://aiproxy_backend;
    }
}
