# Overseas admin panel — AWS ALB(443) → EC2(80), all paths open.
#
# Install:
#   sudo cp deploy/nginx/overseas/ai.pplabs.tech.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/ai.pplabs.tech.conf /etc/nginx/sites-enabled/
#
# Requires: /etc/nginx/conf.d/aiproxy-upstream.conf (defines upstream aiproxy_backend)
#
# Access control: Restrict via ALB Security Group or IP whitelist below.

server {
    listen 80;
    server_name ai.pplabs.tech;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Max request body (file analysis needs large bodies)
    client_max_body_size 100M;

    # [Optional] IP whitelist — uncomment and replace with office egress IPs.
    # allow 203.x.x.x/32;
    # deny all;

    location / {
        proxy_pass http://aiproxy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE streaming support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Timeouts — must be >= 900s for extended thinking (Claude Code etc.)
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
    }
}
